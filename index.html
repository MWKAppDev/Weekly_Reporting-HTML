  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

                color: active ? 'var(--accent)' : 'var(--text-secondary)',

                borderBottom: active ? '2px solid var(--accent)' : '2px solid transparent',
                marginBottom: -1, whiteSpace: 'nowrap', transition: 'all 0.15s',
              }}>
              {w}
              <span style={{
                marginLeft: 8, fontSize: 11, fontFamily: 'DM Mono',
                background: active ? 'var(--accent-light)' : '#F3F4F6',
                color: active ? 'var(--accent)' : 'var(--text-muted)',
                padding: '1px 7px', borderRadius: 10,
              }}>{MOCK_IMPORTED_REPORTS[w].length}</span>
            </button>
          );
        })}
      </div>

      <Card padding="0">
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: '2px solid var(--border)', background: '#FAFBFC' }}>
                {['Document', 'Day', 'Date', 'Entries', ''].map((h, i) => (
                  <th key={i} style={{
                    padding: '10px 14px', textAlign: i === 3 ? 'center' : i === 4 ? 'right' : 'left',
                    fontSize: 11, fontWeight: 600, color: 'var(--text-muted)',
                    letterSpacing: '0.06em', textTransform: 'uppercase',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {docs.length === 0 ? (
                <tr><td colSpan="5" style={{ padding: '32px 14px', textAlign: 'center', color: 'var(--text-muted)' }}>No reports imported for this week</td></tr>
              ) : docs.map((doc, i) => (
                <tr key={doc.id} style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s', cursor: 'pointer' }}
                  onClick={() => openDoc(i)}
                  onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <td style={{ padding: '12px 14px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{
                        width: 30, height: 36, borderRadius: 4, background: '#FEE2E2',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                      }}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#DC2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                        </svg>
                      </div>
                      <span style={{ fontSize: 13, fontWeight: 500, fontFamily: 'DM Mono' }}>{doc.filename}</span>
                    </div>
                  </td>
                  <td style={{ padding: '12px 14px', fontSize: 13 }}>{doc.day}</td>
                  <td style={{ padding: '12px 14px', fontSize: 13, fontFamily: 'DM Mono', color: 'var(--text-secondary)' }}>{doc.date}</td>
                  <td style={{ padding: '12px 14px', textAlign: 'center', fontFamily: 'DM Mono', fontSize: 13 }}>{doc.entries}</td>
                  <td style={{ padding: '12px 14px', textAlign: 'right' }}>
                    <Btn size="sm" variant="subtle" onClick={(e) => { e.stopPropagation(); openDoc(i); }}>
                      📄 Open PDF
                    </Btn>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
};

Object.assign(window, { MOCK_IMPORTED_REPORTS, PdfViewerModal, ImportedReportsScreen });

</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Shared UI primitives ───────────────────────────────────────────── */

const Badge = ({ status }) => {
  const map = {
    finalized: { label: 'Finalized', bg: 'var(--success-light)', color: 'var(--success)' },
    in_progress: { label: 'In Progress', bg: 'var(--warning-light)', color: 'var(--warning)' },
    confirmed: { label: 'Confirmed', bg: 'var(--success-light)', color: 'var(--success)' },
    unconfirmed: { label: 'Pending', bg: 'var(--warning-light)', color: 'var(--warning)' },
  };
  const s = map[status] || map.in_progress;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: s.bg, color: s.color,
      fontSize: 11, fontWeight: 600, letterSpacing: '0.03em',
      padding: '3px 9px', borderRadius: 20,
    }}>
      <span style={{ width: 5, height: 5, borderRadius: '50%', background: s.color, flexShrink: 0 }}></span>
      {s.label}
    </span>
  );
};

const Btn = ({ children, variant = 'primary', size = 'md', onClick, disabled, style }) => {
  const [hov, setHov] = useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
    fontFamily: 'DM Sans', fontWeight: 500, transition: 'all 0.15s',
    borderRadius: 8, whiteSpace: 'nowrap', outline: 'none',
  };
  const sizes = {
    sm: { padding: '5px 12px', fontSize: 12 },
    md: { padding: '8px 16px', fontSize: 13 },
    lg: { padding: '10px 20px', fontSize: 14 },
  };
  const variants = {
    primary: { background: hov && !disabled ? 'var(--accent-hover)' : 'var(--accent)', color: '#fff' },
    ghost: { background: hov && !disabled ? '#F3F4F6' : 'transparent', color: 'var(--text-primary)', border: '1px solid var(--border)' },
    danger: { background: hov && !disabled ? 'oklch(0.47 0.20 20)' : 'var(--danger)', color: '#fff' },
    success: { background: hov && !disabled ? 'oklch(0.47 0.16 145)' : 'var(--success)', color: '#fff' },
    subtle: { background: hov && !disabled ? 'var(--accent-mid)' : 'var(--accent-light)', color: 'var(--accent)' },
  };
  return (
    <button
      onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], opacity: disabled ? 0.5 : 1, ...style }}
    >
      {children}
    </button>
  );
};

const Card = ({ children, style, padding = '20px 24px' }) => (
  <div style={{
    background: 'var(--card-bg)', border: '1px solid var(--border)',
    borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)',
    padding, ...style,
  }}>{children}</div>
);

const PageHeader = ({ title, subtitle, actions }) => (
  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 24 }}>
    <div>
      <h1 style={{ fontSize: 22, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.02em' }}>{title}</h1>
      {subtitle && <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginTop: 3 }}>{subtitle}</p>}
    </div>
    {actions && <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>{actions}</div>}
  </div>
);

const Table = ({ columns, rows, emptyMsg = 'No data' }) => (
  <div style={{ overflowX: 'auto' }}>
    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
      <thead>
        <tr style={{ borderBottom: '2px solid var(--border)' }}>
          {columns.map((col, i) => (
            <th key={i} style={{
              padding: '10px 14px', textAlign: col.align || 'left',
              fontSize: 11, fontWeight: 600, color: 'var(--text-muted)',
              letterSpacing: '0.06em', textTransform: 'uppercase',
              whiteSpace: 'nowrap',
            }}>{col.label}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.length === 0 ? (
          <tr><td colSpan={columns.length} style={{ padding: '32px 14px', textAlign: 'center', color: 'var(--text-muted)', fontSize: 13 }}>{emptyMsg}</td></tr>
        ) : rows.map((row, ri) => (
          <tr key={ri} style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s' }}
            onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            {columns.map((col, ci) => (
              <td key={ci} style={{ padding: '13px 14px', textAlign: col.align || 'left', color: 'var(--text-primary)' }}>
                {col.render ? col.render(row) : row[col.key]}
              </td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
  </div>
);

const StatCard = ({ label, value, sub, accent }) => (
  <Card style={{ flex: 1, minWidth: 140 }} padding="18px 22px">
    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>{label}</div>
    <div style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-0.03em', color: accent ? 'var(--accent)' : 'var(--text-primary)', fontFamily: 'DM Mono' }}>{value}</div>
    {sub && <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 4 }}>{sub}</div>}
  </Card>
);

const Divider = ({ style }) => <div style={{ height: 1, background: 'var(--border)', ...style }} />;

const Input = ({ value, onChange, placeholder, style }) => {
  const [focus, setFocus] = useState(false);
  return (
    <input
      value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
      style={{
        height: 36, padding: '0 12px', fontSize: 13, fontFamily: 'DM Sans',
        border: `1px solid ${focus ? 'var(--accent)' : 'var(--border)'}`,
        borderRadius: 8, outline: 'none', background: '#fff', color: 'var(--text-primary)',
        transition: 'border-color 0.15s', width: '100%', ...style,
      }}
    />
  );
};

const Select = ({ value, onChange, options, style }) => (
  <select value={value} onChange={e => onChange(e.target.value)} style={{
    height: 36, padding: '0 10px', fontSize: 13, fontFamily: 'DM Sans',
    border: '1px solid var(--border)', borderRadius: 8, outline: 'none',
    background: '#fff', color: 'var(--text-primary)', cursor: 'pointer', ...style,
  }}>
    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);

/* ── Sidebar ─────────────────────────────────────────────────────────── */

const NAV = [
  { id: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
  { id: 'import', label: 'Import Week', icon: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12' },
  { id: 'history', label: 'History', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' },
];

const ADMIN_NAV = [
  { id: 'employees', label: 'Employees', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z' },
  { id: 'wages', label: 'Wages', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
  { id: 'task_codes', label: 'Task Codes', icon: 'M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z' },
];

const ARCHIVE_NAV = [
  { id: 'imported', label: 'Imported Reports', icon: 'M21 8v13H3V8M1 3h22v5H1zM10 12h4' },
];

const SCREEN_LABELS = {
  dashboard: 'Dashboard',
  import: 'Import Week',
  history: 'Week History',
  review: 'Review Week',
  summary: 'Week Summary',
  employees: 'Employees',
  wages: 'Wage Table',
  task_codes: 'Task Codes',
  imported: 'Imported Reports',
};

const NavItem = ({ item, active, onClick }) => {
  const [hov, setHov] = useState(false);
  const bg = active ? 'rgba(255,255,255,0.12)' : hov ? 'rgba(255,255,255,0.06)' : 'transparent';
  const color = active ? '#FFFFFF' : hov ? '#E5E7EB' : '#9CA3AF';
  return (
    <button onClick={() => onClick(item.id)}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        width: '100%', display: 'flex', alignItems: 'center', gap: 10,
        padding: '9px 12px', borderRadius: 8, border: 'none', cursor: 'pointer',
        background: bg, color, fontSize: 13, fontWeight: active ? 600 : 400,
        fontFamily: 'DM Sans', transition: 'all 0.15s', textAlign: 'left',
      }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d={item.icon} />
      </svg>
      {item.label}
      {active && <div style={{ marginLeft: 'auto', width: 4, height: 4, borderRadius: '50%', background: 'var(--accent)', flexShrink: 0 }} />}
    </button>
  );
};

const Sidebar = ({ active, onNav, tweaks }) => {
  const showLabels = tweaks.sectionLabels !== false;
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    const close = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const handleUpdate = () => {
    setMenuOpen(false);
    if (window.confirm('Restart Weekly Reporting to apply the latest update?')) {
      window.location.reload();
    }
  };

  return (
    <div style={{
      width: 'var(--sidebar-width)', minWidth: 'var(--sidebar-width)',
      background: 'var(--sidebar-bg)', display: 'flex', flexDirection: 'column',
      padding: '0 10px 12px', borderRight: '1px solid rgba(255,255,255,0.06)',
      height: '100%',
    }}>
      {/* Logo area + Settings menu */}
      <div style={{ padding: '20px 8px 18px', borderBottom: '1px solid rgba(255,255,255,0.08)', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{
          width: 30, height: 30, borderRadius: 8, flexShrink: 0,
          background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/>
          </svg>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ color: '#F9FAFB', fontSize: 13, fontWeight: 700, letterSpacing: '-0.01em', lineHeight: 1.2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
            {tweaks.companyName || 'SiteConnect'}
          </div>
          <div style={{ color: '#6B7280', fontSize: 10, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Field Reports</div>
        </div>
        <div ref={menuRef} style={{ position: 'relative' }}>
          <button onClick={() => setMenuOpen(o => !o)}
            title="Settings"
            style={{
              width: 28, height: 28, borderRadius: 6, flexShrink: 0,
              background: menuOpen ? 'rgba(255,255,255,0.10)' : 'transparent',
              border: 'none', color: '#9CA3AF', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background 0.15s',
            }}
            onMouseEnter={e => { if (!menuOpen) e.currentTarget.style.background = 'rgba(255,255,255,0.06)'; }}
            onMouseLeave={e => { if (!menuOpen) e.currentTarget.style.background = 'transparent'; }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          {menuOpen && (
            <div style={{
              position: 'absolute', top: 34, right: 0, zIndex: 50, width: 200,
              background: '#1F2229', border: '1px solid rgba(255,255,255,0.10)', borderRadius: 8,
              boxShadow: '0 8px 24px rgba(0,0,0,0.4)', overflow: 'hidden', padding: 4,
            }}>
              <button onClick={handleUpdate}
                style={{
                  display: 'flex', alignItems: 'center', gap: 9, width: '100%',
                  padding: '8px 10px', background: 'transparent', border: 'none',
                  color: '#E5E7EB', fontSize: 12, fontFamily: 'DM Sans', fontWeight: 500,
                  cursor: 'pointer', borderRadius: 6, textAlign: 'left',
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.06)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="oklch(0.66 0.17 50)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                  <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                <div style={{ flex: 1 }}>
                  <div>Check for Update</div>
                  <div style={{ fontSize: 10, color: '#6B7280', marginTop: 1 }}>Restart to apply</div>
                </div>
              </button>
              <div style={{ height: 1, background: 'rgba(255,255,255,0.08)', margin: '4px 0' }}></div>
              <div style={{ padding: '6px 10px', fontSize: 10, color: '#6B7280', fontFamily: 'DM Mono' }}>
                v1.0 · {new Date().toLocaleDateString('en-CA', { month: 'short', year: 'numeric' })}
              </div>
            </div>
          )}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {/* Reports nav */}
        <div style={{ marginBottom: 4 }}>
          {showLabels && <div style={{ fontSize: 10, fontWeight: 600, color: '#4B5563', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '0 10px', marginBottom: 4 }}>Reports</div>}
          {NAV.map(item => <NavItem key={item.id} item={item} active={active === item.id} onClick={onNav} />)}
        </div>

        <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', margin: '10px 0' }} />

        {/* Admin nav */}
        <div>
          {showLabels && <div style={{ fontSize: 10, fontWeight: 600, color: '#4B5563', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '0 10px', marginBottom: 4 }}>Admin</div>}
          {ADMIN_NAV.map(item => <NavItem key={item.id} item={item} active={active === item.id} onClick={onNav} />)}
        </div>

        <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', margin: '10px 0' }} />

        {/* Reports Archive nav */}
        <div>
          {showLabels && <div style={{ fontSize: 10, fontWeight: 600, color: '#4B5563', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '0 10px', marginBottom: 4 }}>Reports Archive</div>}
          {ARCHIVE_NAV.map(item => <NavItem key={item.id} item={item} active={active === item.id} onClick={onNav} />)}
        </div>
      </div>

    </div>
  );
};

/* ── Dashboard ───────────────────────────────────────────────────────── */

const Dashboard = ({ onNav, tweaks }) => {
  const totalHours = MOCK_SUMMARY.by_task_code.reduce((s, r) => s + r.total_hours, 0);
  const totalCost = MOCK_SUMMARY.by_task_code.reduce((s, r) => s + r.cost_burden, 0);

  const cols = [
    { key: 'label', label: 'Week' },
    { key: 'date_start', label: 'Date Range', render: r => `${r.date_start} – ${r.date_end}` },
    { key: 'status', label: 'Status', render: r => <Badge status={r.status} /> },
    { key: 'employee_count', label: 'Employees', align: 'center' },
    { key: 'actions', label: '', align: 'right', render: r => (
      <Btn size="sm" variant={r.status === 'finalized' ? 'ghost' : 'subtle'} onClick={() => onNav(r.status === 'finalized' ? 'summary' : 'review')}>
        {r.status === 'finalized' ? 'View Summary' : 'Continue →'}
      </Btn>
    )},
  ];

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      <PageHeader
        title="Dashboard"
        subtitle={`Week of ${new Date().toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' })}`}
        actions={<Btn onClick={() => onNav('import')}>+ Import Week</Btn>}
      />

      {/* Stat row */}
      <div style={{ display: 'flex', gap: 14, marginBottom: 24 }}>
        <StatCard label="Total Weeks" value={MOCK_WEEKS.length} sub="All time" />
        <StatCard label="Active Employees" value={MOCK_EMPLOYEES.length} sub="On roster" />
        <StatCard label="Hours This Week" value={totalHours.toFixed(0)} sub="In progress" accent />
        <StatCard label="Est. Labour Cost" value={`$${(totalCost/1000).toFixed(1)}k`} sub="With burden" accent />
        <StatCard label="Last Import" value={MOCK_WEEKS[0].date_end.split(',')[0]} sub={MOCK_WEEKS[0].label} />
      </div>

      {/* Recent weeks */}
      <Card padding="0">
        <div style={{ padding: '16px 20px 14px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Recent Weeks</div>
          <Btn variant="ghost" size="sm" onClick={() => onNav('history')}>View All</Btn>
        </div>
        <Table columns={cols} rows={MOCK_WEEKS} />

/* ── Import Week ─────────────────────────────────────────────────────── */

const DAY_LABELS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const DAY_SHORT  = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

const ImportWeek = ({ onNav }) => {
  // Bulk file list — up to 6 PDFs in any order; user assigns days at review time.
  const [files, setFiles] = useState([]);
  const [isDragging, setIsDragging] = useState(false);
  const [startDate, setStartDate] = useState('2025-04-27'); // Sunday
  const [showHelp, setShowHelp] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [progress, setProgress] = useState(0);
  const [statusMsg, setStatusMsg] = useState('');
  const fileInputRef = useRef(null);

  // Auto-calc end date = start + 5 (Sun→Fri) or +6 (Sun→Sat) — show full Sun→Sat range
  const start = new Date(startDate + 'T12:00:00');
  const dayOfWeek = start.getDay(); // 0=Sun
  // Snap to nearest Sunday for display
  const sunday = new Date(start);
  sunday.setDate(sunday.getDate() - dayOfWeek);
  const saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 6);

  const fmt = (d) => d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  const fmtFull = (d) => d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  const dayDate = (offset) => {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + offset);
    return d;
  };

  const addFiles = (incoming) => {
    const pdfs = Array.from(incoming).filter(f => (f.name || '').toLowerCase().endsWith('.pdf'));
    if (!pdfs.length) return;
    setFiles(prev => {
      const next = [...prev];
      for (const f of pdfs) {
        if (next.length >= 6) break;
        if (!next.some(x => x.name === f.name)) next.push({ name: f.name, size: f.size || 0 });
      }
      return next;
    });
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragging(false);
    addFiles(e.dataTransfer.files);
  };

  const handleBrowse = () => {
    // Mock: simulate a multi-file picker — add up to 6 sample names
    const names = ['Daily_Sun.pdf','Daily_Mon.pdf','Daily_Tue.pdf','Daily_Wed.pdf','Daily_Thu.pdf','Daily_Fri.pdf'];
    const fakeFiles = names.map(n => ({ name: n, size: 184320 + Math.floor(Math.random() * 200000) }));
    addFiles(fakeFiles);
  };

  const removeFile = (name) => setFiles(prev => prev.filter(f => f.name !== name));
  const clearAll = () => setFiles([]);
  const filledCount = files.length;
  const fmtSize = (b) => b < 1024 ? `${b} B` : b < 1024*1024 ? `${(b/1024).toFixed(0)} KB` : `${(b/1024/1024).toFixed(1)} MB`;

  const startProcessing = () => {
    if (processing) return;
    setProcessing(true);
    setProgress(0);
    const stages = [
      { pct: 12, msg: 'Reading PDF metadata…' },
      { pct: 28, msg: 'Running OCR on daily reports…' },
      { pct: 48, msg: 'Extracting labour entries…' },
      { pct: 66, msg: 'Matching employee names…' },
      { pct: 82, msg: 'Linking task codes by keyword…' },
      { pct: 95, msg: 'Saving to database…' },
      { pct: 100, msg: 'Done — opening review' },
    ];
    let i = 0;
    const tick = () => {
      if (i >= stages.length) {
        setTimeout(() => onNav('review'), 350);
        return;
      }
      setProgress(stages[i].pct);
      setStatusMsg(stages[i].msg);
      i++;
      setTimeout(tick, 480);
    };
    tick();
  };

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      <PageHeader
        title="Import Weekly Reports"
        subtitle="Drop one PDF per day. Dates auto-calculate from the start of the week (Sunday)."
      />

      <div style={{ maxWidth: 760, display: 'flex', flexDirection: 'column', gap: 18 }}>
        {/* Week Date Range — auto-calc */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <span style={{ color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.05em', fontSize: 11, fontWeight: 600 }}>Week Date Range</span>
            <span style={{ position: 'relative' }}>
              <button
                onMouseEnter={() => setShowHelp(true)}
                onMouseLeave={() => setShowHelp(false)}
                style={{
                  width: 16, height: 16, borderRadius: '50%', border: '1px solid var(--border)',
                  background: '#fff', color: 'var(--text-muted)', fontSize: 10, fontWeight: 700,
                  cursor: 'help', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  fontFamily: 'DM Sans',
                }}>?</button>
              {showHelp && (
                <div style={{
                  position: 'absolute', top: 22, left: -8, zIndex: 10, width: 260,
                  padding: '10px 12px', background: '#1A1D23', color: '#E5E7EB',
                  fontSize: 11, lineHeight: 1.5, borderRadius: 8, boxShadow: 'var(--shadow-md)',
                }}>
                  Dates are read-only — they're calculated automatically from the
                  Sunday you select. The week always runs Sunday → Saturday.
                </div>
              )}
            </span>
          </div>

          <div style={{ display: 'flex', gap: 16, alignItems: 'flex-end' }}>
            <div style={{ width: 200 }}>
              <label style={{ fontSize: 12, color: 'var(--text-muted)', display: 'block', marginBottom: 5 }}>
                Week Starting (Sunday)
              </label>
              <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={{
                width: '100%', height: 36, padding: '0 10px', fontSize: 13, fontFamily: 'DM Sans',
                border: '1px solid var(--border)', borderRadius: 8, outline: 'none', background: '#fff',
              }} />
            </div>

            <div style={{ flex: 1, padding: '8px 14px', background: 'var(--accent-light)', border: '1px solid var(--accent-mid)', borderRadius: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Auto-calculated</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--accent)', fontFamily: 'DM Sans', marginTop: 2 }}>
                {fmt(sunday)} – {fmtFull(saturday)}
              </div>
            </div>
          </div>
        </Card>

        {/* Bulk PDF drop zone */}
        <Card padding="0">
          <div style={{ padding: '16px 20px 14px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>Daily Report PDFs</div>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>Drop all PDFs at once · day & date are detected automatically · up to 6 files</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: 'DM Mono' }}>{filledCount}/6</span>
              {filledCount > 0 && (
                <Btn size="sm" variant="ghost" onClick={clearAll}>Clear all</Btn>
              )}
            </div>
          </div>

          <div style={{ padding: 20 }}>
            <div
              onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
              style={{
                border: `2px dashed ${isDragging ? 'var(--accent)' : 'var(--border)'}`,
                borderRadius: 12,
                background: isDragging ? 'var(--accent-light)' : '#FAFBFC',
                padding: '32px 24px',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                textAlign: 'center', gap: 10, transition: 'all 0.15s',
                minHeight: 160,
              }}>
              <div style={{
                width: 48, height: 48, borderRadius: 12,
                background: isDragging ? 'var(--accent)' : '#fff',
                border: '1px solid var(--border)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: isDragging ? '#fff' : 'var(--text-muted)',
                fontSize: 22, fontWeight: 300, fontFamily: 'DM Mono',
                transition: 'all 0.15s',
              }}>↓</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>
                {isDragging ? 'Drop to add PDFs' : 'Drop daily report PDFs here'}
              </div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                or
              </div>
              <Btn size="sm" variant="subtle" onClick={handleBrowse}>Browse files…</Btn>
              <input ref={fileInputRef} type="file" accept="application/pdf" multiple style={{ display: 'none' }}
                onChange={e => addFiles(e.target.files)} />
            </div>

            {filledCount > 0 && (
              <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 6 }}>
                {files.map((f, i) => (
                  <div key={f.name} style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 8,
                    background: '#fff',
                  }}>
                    <div style={{
                      width: 32, height: 32, borderRadius: 6,
                      background: 'var(--success-light)', color: 'var(--success)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 10, fontWeight: 700, fontFamily: 'DM Mono', letterSpacing: '0.05em',
                      flexShrink: 0,
                    }}>PDF</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 500, fontFamily: 'DM Mono', color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{f.name}</div>
                      <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>{fmtSize(f.size)} · day will be auto-detected</div>
                    </div>
                    <button onClick={() => removeFile(f.name)}
                      style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 18, lineHeight: 1, padding: 4 }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </Card>

        {/* Process Button & Progress */}
        {!processing ? (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
              {filledCount === 0 ? 'Add at least one PDF to begin' : `Ready to process ${filledCount} file${filledCount !== 1 ? 's' : ''}`}
            </span>
            <Btn disabled={filledCount === 0} onClick={startProcessing}>
              Process {filledCount > 0 && `${filledCount} File${filledCount !== 1 ? 's' : ''}`} →
            </Btn>
          </div>
        ) : (
          <Card>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 600 }}>Processing Reports…</span>
              <span style={{ fontSize: 12, fontFamily: 'DM Mono', color: 'var(--accent)', fontWeight: 600 }}>{progress}%</span>
            </div>
            <div style={{ height: 6, background: '#F0F2F5', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{
                height: '100%', width: `${progress}%`,
                background: 'linear-gradient(90deg, var(--accent) 0%, oklch(0.66 0.18 240) 100%)',
                borderRadius: 3, transition: 'width 0.4s ease',
              }} />
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 10, fontFamily: 'DM Mono' }}>
              <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', marginRight: 8, animation: 'pulse 1s infinite' }}></span>
              {statusMsg}
            </div>
          </Card>
        )}
      </div>

      <style>{`
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      `}</style>
    </div>
  );
};

/* ── History ─────────────────────────────────────────────────────────── */

const History = ({ onNav }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const filtered = MOCK_WEEKS.filter(w => {
    const matchSearch = w.label.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter === 'all' || w.status === filter;
    return matchSearch && matchFilter;
  });

  const cols = [
    { key: 'label', label: 'Week', render: r => <span style={{ fontWeight: 500 }}>{r.label}</span> },
    { key: 'dates', label: 'Date Range', render: r => <span style={{ fontFamily: 'DM Mono', fontSize: 12, color: 'var(--text-secondary)' }}>{r.date_start} – {r.date_end}</span> },
    { key: 'status', label: 'Status', render: r => <Badge status={r.status} /> },
    { key: 'employee_count', label: 'Employees', align: 'center', render: r => <span style={{ fontFamily: 'DM Mono' }}>{r.employee_count}</span> },
    { key: 'actions', label: '', align: 'right', render: r => (
      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
        <Btn size="sm" variant="ghost" onClick={() => onNav('summary')}>Summary</Btn>
        {r.status === 'in_progress' && <Btn size="sm" variant="subtle" onClick={() => onNav('review')}>Continue</Btn>}
      </div>
    )},
  ];

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      <PageHeader title="Week History" subtitle={`${MOCK_WEEKS.length} weeks on record`} />

      <div style={{ display: 'flex', gap: 10, marginBottom: 18 }}>
        <Input value={search} onChange={setSearch} placeholder="Search weeks…" style={{ maxWidth: 260 }} />
        <Select value={filter} onChange={setFilter} options={[
          { value: 'all', label: 'All Status' },
          { value: 'finalized', label: 'Finalized' },
          { value: 'in_progress', label: 'In Progress' },
        ]} />
      </div>

      <Card padding="0">
        <Table columns={cols} rows={filtered} emptyMsg="No weeks match your filter" />
      </Card>
    </div>
  );
};

          color: value ? 'var(--text-primary)' : 'var(--text-muted)',

          </div>

              <button key={o.id}

                  color: value === o.label ? 'var(--accent)' : 'var(--text-primary)',

                  fontWeight: value === o.label ? 600 : 400,
                }}
                onMouseEnter={e => { if (value !== o.label) e.currentTarget.style.background = '#FAFBFC'; }}

            <button
