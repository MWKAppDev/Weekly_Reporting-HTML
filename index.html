const ReviewScreen = ({ onNav }) => {
  const [entries, setEntries] = useState(MOCK_REVIEW_ENTRIES.map(e => ({ ...e, id: Math.random(), editing: false, linked: e.linked_employee })));
  const [selected, setSelected] = useState(new Set()); // ids
  const [past, setPast]   = useState([]);
  const [future, setFuture] = useState([]);
  const [combineOpen, setCombineOpen] = useState(false);
  const [pdfOpen, setPdfOpen] = useState(false);
  const [pdfStartIdx, setPdfStartIdx] = useState(0);

  const totalEmp = entries.length;
  const confirmed = entries.filter(e => e.confirmed).length;
  const allConfirmed = totalEmp > 0 && confirmed === totalEmp;

  const docs = MOCK_IMPORTED_REPORTS['Apr 28 – May 2, 2025'] || [];

  // Undo/redo wrapper
  const apply = (mut) => {
    setPast(p => [...p, entries]);
    setFuture([]);
    setEntries(mut(entries));
  };
  const undo = () => {
    if (past.length === 0) return;
    const prev = past[past.length - 1];
    setPast(p => p.slice(0, -1));
    setFuture(f => [entries, ...f]);
    setEntries(prev);
  };
  const redo = () => {
    if (future.length === 0) return;
    const next = future[0];
    setFuture(f => f.slice(1));
    setPast(p => [...p, entries]);
    setEntries(next);
  };

  const toggleSelect = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const confirmEmployee = (id) => apply(es => es.map(e => e.id === id ? { ...e, confirmed: true, editing: false } : e));
  const toggleEdit = (id) => apply(es => es.map(e => e.id === id ? { ...e, editing: !e.editing, confirmed: e.editing ? true : false } : e));
  const setLinked = (id, val) => apply(es => es.map(e => e.id === id ? { ...e, linked: val } : e));
  const updateField = (empId, entryIdx, field, val) =>
    apply(es => es.map(e => e.id === empId ? { ...e, entries: e.entries.map((en, j) => j === entryIdx ? { ...en, [field]: val } : en) } : e));

  const addEmployeeEntry = () => apply(es => [...es, {
    id: Math.random(), raw_name: 'New Employee Entry', linked: null, confirmed: false, editing: true,
    entries: [{ id: Date.now(), day: 'Mon', description: '', code: null, hours: 0 }],
  }]);
  const confirmSelected = () => apply(es => es.map(e => selected.has(e.id) ? { ...e, confirmed: true, editing: false } : e));
  const deleteSelected = () => {
    if (!window.confirm(`Delete ${selected.size} selected employee entr${selected.size === 1 ? 'y' : 'ies'}?`)) return;
    apply(es => es.filter(e => !selected.has(e.id)));
    setSelected(new Set());
  };
  const combineSelected = (combinedName) => {
    apply(es => {
      const sel = es.filter(e => selected.has(e.id));
      const rest = es.filter(e => !selected.has(e.id));
      const merged = {
        id: Math.random(), raw_name: combinedName, linked: sel[0]?.linked || null,
        confirmed: false, editing: false,
        entries: sel.flatMap(s => s.entries),
      };
      return [...rest, merged];
    });
    setSelected(new Set());
    setCombineOpen(false);
  };

  const selCount = selected.size;
  const selectedNames = entries.filter(e => selected.has(e.id)).map(e => e.raw_name);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {pdfOpen && <PdfViewerModal docs={docs} startIndex={pdfStartIdx} onClose={() => setPdfOpen(false)} />}
      {combineOpen && <CombineDialog names={selectedNames} onCombine={combineSelected} onClose={() => setCombineOpen(false)} />}

      {/* Top bar — Title + Finalize */}
      <div style={{ padding: '14px 32px', background: '#fff', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0 }}>
        <Btn variant="ghost" size="sm" onClick={() => onNav('import')}>← Back</Btn>
        <div style={{ width: 1, height: 20, background: 'var(--border)' }} />
        <div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>Review Week: Apr 28 – May 2, 2025</div>
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
            <span style={{ fontFamily: 'DM Mono', fontWeight: 600, color: allConfirmed ? 'var(--success)' : 'var(--text-primary)' }}>{confirmed}</span>
            <span> of </span>
            <span style={{ fontFamily: 'DM Mono', fontWeight: 600 }}>{totalEmp}</span>
            <span> confirmed</span>
          </div>
          <div style={{ width: 120, height: 4, background: '#F0F2F5', borderRadius: 2 }}>
            <div style={{ height: '100%', width: `${totalEmp ? (confirmed/totalEmp)*100 : 0}%`, background: allConfirmed ? 'var(--success)' : 'var(--accent)', borderRadius: 2, transition: 'width 0.3s' }} />
          </div>
          <Btn variant="success" disabled={!allConfirmed} onClick={() => onNav('summary')}>
            ✓ Finalize Week
          </Btn>
        </div>
      </div>

      {/* Toolbar — Undo/Redo + Add/Combine/Confirm/Delete Selected */}
      <div style={{ padding: '10px 32px', background: '#FAFBFC', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
        {/* Undo/Redo */}
        <button onClick={undo} disabled={past.length === 0}
          title="Undo"
          style={{
            width: 32, height: 32, borderRadius: 8,
            background: past.length === 0 ? '#F3F4F6' : 'oklch(0.97 0.04 75)',
            border: `1px solid ${past.length === 0 ? 'var(--border)' : 'oklch(0.85 0.10 75)'}`,
            color: past.length === 0 ? 'var(--text-muted)' : 'oklch(0.55 0.16 65)',
            cursor: past.length === 0 ? 'not-allowed' : 'pointer',
            fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>↶</button>
        <button onClick={redo} disabled={future.length === 0}
          title="Redo"
          style={{
            width: 32, height: 32, borderRadius: 8,
            background: future.length === 0 ? '#F3F4F6' : 'oklch(0.97 0.04 75)',
            border: `1px solid ${future.length === 0 ? 'var(--border)' : 'oklch(0.85 0.10 75)'}`,
            color: future.length === 0 ? 'var(--text-muted)' : 'oklch(0.55 0.16 65)',
            cursor: future.length === 0 ? 'not-allowed' : 'pointer',
            fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>↷</button>

        <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 6px' }} />

        <Btn size="sm" variant="ghost" onClick={addEmployeeEntry}>+ Add Employee Entry</Btn>

        <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 6px' }} />

        {/* Bulk-action group — disabled when nothing selected */}
        <Btn size="sm" variant="ghost" disabled={selCount < 2} onClick={() => setCombineOpen(true)}>
          ⊞ Combine Selected{selCount >= 2 ? ` (${selCount})` : ''}
        </Btn>
        <Btn size="sm" variant="success" disabled={selCount === 0} onClick={confirmSelected}>
          ✓ Confirm Selected{selCount > 0 ? ` (${selCount})` : ''}
        </Btn>
        <Btn size="sm" variant="danger" disabled={selCount === 0} onClick={deleteSelected}>
          🗑 Delete Selected{selCount > 0 ? ` (${selCount})` : ''}
        </Btn>

        <div style={{ flex: 1 }} />
        {selCount > 0 && (
          <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
            <span style={{ fontFamily: 'DM Mono', fontWeight: 600, color: 'var(--accent)' }}>{selCount}</span> selected ·
            <button onClick={() => setSelected(new Set())} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12, marginLeft: 4 }}>Clear</button>
          </span>
        )}
      </div>

      {/* Employee sections */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 32px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {entries.map((emp) => {
          const totalHrs = emp.entries.reduce((s, e) => s + (parseFloat(e.hours) || 0), 0);
          const unassigned = emp.entries.filter(e => !e.code).length;
          const isSelected = selected.has(emp.id);
          const isLocked = emp.confirmed && !emp.editing; // confirmed groups are read-only unless edit toggled

          return (
            <Card key={emp.id} padding="0" style={{
              border: isSelected ? '2px solid var(--accent)' : emp.confirmed ? '1px solid oklch(0.85 0.06 145)' : '1px solid var(--border)',
              transition: 'border 0.15s',
            }}>
              {/* Employee header */}
              <div style={{
                padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 14,
                background: emp.confirmed ? 'var(--success-light)' : '#FAFBFC',
                borderRadius: '10px 10px 0 0',
              }}>
                {/* Selection checkbox */}
                <input type="checkbox" checked={isSelected} onChange={() => toggleSelect(emp.id)}
                  style={{ width: 16, height: 16, accentColor: 'var(--accent)', cursor: 'pointer', flexShrink: 0 }} />

                <div style={{
                  width: 34, height: 34, borderRadius: '50%', flexShrink: 0,
                  background: emp.confirmed ? 'var(--success)' : 'var(--accent)',
                  color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, fontWeight: 700,
                }}>
                  {emp.raw_name.split(/[ /]+/).map(n => n[0]).join('').slice(0, 2).toUpperCase()}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{emp.raw_name}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>
                    {totalHrs.toFixed(1)}h total · {emp.entries.length} entries
                    {unassigned > 0 && <span style={{ color: 'var(--warning)', marginLeft: 8 }}>⚠ {unassigned} unassigned</span>}
                  </div>
                </div>

                <EmployeeLinker value={emp.linked} onChange={(v) => setLinked(emp.id, v)} disabled={isLocked} />

                {/* Edit toggle for confirmed groups */}
                {emp.confirmed && (
                  <Btn variant={emp.editing ? 'success' : 'ghost'} size="sm" onClick={() => toggleEdit(emp.id)}>
                    {emp.editing ? '✓ Done' : '✏ Edit Entry'}
                  </Btn>
                )}

                {emp.confirmed && !emp.editing ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--success)', fontSize: 13, fontWeight: 600 }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Confirmed
                  </div>
                ) : !emp.confirmed && (
                  <Btn variant="success" size="sm" onClick={() => confirmEmployee(emp.id)}>Confirm Entry</Btn>
                )}
              </div>

              {/* Task rows */}
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: '70px 1fr 220px 70px 100px', padding: '8px 20px', background: 'var(--border-light)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)', alignItems: 'center' }}>
                  {['Day', 'Task Description', 'Assigned Code', 'Hours', 'Document'].map((h, i) => (
                    <div key={i} style={{
                      fontSize: 10, fontWeight: 600, color: 'var(--text-muted)',
                      letterSpacing: '0.06em', textTransform: 'uppercase',
                      textAlign: i === 3 ? 'right' : i === 4 ? 'right' : 'left',
                      paddingRight: i === 3 ? 8 : 0,
                    }}>{h}</div>
                  ))}
                </div>

                {emp.entries.map((entry, entryIdx) => {
                  const docIdx = DAY_SHORT_ABBR.indexOf(entry.day) >= 0 ? DAY_SHORT_ABBR.indexOf(entry.day) : 0;
                  return (
                    <div key={entryIdx} style={{
                      display: 'grid', gridTemplateColumns: '70px 1fr 220px 70px 100px',
                      padding: '10px 20px', borderBottom: entryIdx < emp.entries.length - 1 ? '1px solid var(--border-light)' : 'none',
                      background: !entry.code ? 'oklch(0.99 0.02 55)' : 'transparent',
                      alignItems: 'center', gap: 8,
                    }}>
                      {/* Day */}
                      {isLocked ? (
                        <div style={{ fontSize: 12, fontFamily: 'DM Mono', color: 'var(--text-muted)' }}>{entry.day}</div>
                      ) : (
                        <select value={entry.day} onChange={e => updateField(emp.id, entryIdx, 'day', e.target.value)} style={{
                          height: 28, padding: '0 4px', fontSize: 11, fontFamily: 'DM Mono',
                          border: '1px solid var(--border)', borderRadius: 6, outline: 'none', background: '#fff',
                        }}>
                          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <option key={d}>{d}</option>)}
                        </select>
                      )}

                      {/* Description */}
                      {isLocked ? (
                        <div style={{ fontSize: 12, paddingRight: 12, color: 'var(--text-primary)' }}>{entry.description}</div>
                      ) : (
                        <textarea
                          value={entry.description}
                          onChange={e => updateField(emp.id, entryIdx, 'description', e.target.value)}
                          rows={1}
                          style={{
                            width: '100%', minHeight: 28, padding: '6px 8px', fontSize: 12, fontFamily: 'DM Sans',
                            border: '1px solid var(--border)', borderRadius: 6, outline: 'none', background: '#fff',
                            resize: 'vertical', lineHeight: 1.4,
                          }}
                        />
                      )}

                      {/* Code */}
                      {isLocked ? (
                        <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{entry.code || '—'}</div>
                      ) : (
                        <select
                          value={entry.code || ''}
                          onChange={e => updateField(emp.id, entryIdx, 'code', e.target.value || null)}
                          style={{
                            height: 28, padding: '0 6px', fontSize: 11, fontFamily: 'DM Sans',
                            border: `1px solid ${!entry.code ? 'var(--warning)' : 'var(--border)'}`,
                            borderRadius: 6, outline: 'none', background: '#fff', width: '100%',
                          }}>
                          <option value="">— Unassigned —</option>
                          {MOCK_TASK_CODES.map(c => <option key={c.id} value={c.code_name}>{c.code_name}</option>)}
                        </select>
                      )}

                      {/* Hours (00.00 mask via input pattern) */}
                      {isLocked ? (
                        <div style={{ fontSize: 13, fontFamily: 'DM Mono', fontWeight: 500, textAlign: 'right', paddingRight: 8 }}>{(parseFloat(entry.hours)||0).toFixed(1)}h</div>
                      ) : (
                        <input
                          type="text"
                          inputMode="decimal"
                          value={entry.hours}
                          onChange={e => {
                            const v = e.target.value.replace(/[^0-9.]/g, '');
                            updateField(emp.id, entryIdx, 'hours', v);
                          }}
                          placeholder="00.00"
                          style={{
                            height: 28, padding: '0 8px', fontSize: 12, fontFamily: 'DM Mono',
                            border: '1px solid var(--border)', borderRadius: 6, outline: 'none',
                            background: '#fff', textAlign: 'right', width: '100%',
                          }}
                        />
                      )}

                      {/* View PDF */}
                      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                        <button
                          onClick={() => { setPdfStartIdx(docIdx); setPdfOpen(true); }}
                          style={{
                            height: 26, padding: '0 8px', fontSize: 11, fontFamily: 'DM Sans',
                            background: 'var(--accent-light)', color: 'var(--accent)',
                            border: 'none', borderRadius: 6, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', gap: 4, fontWeight: 500,
                          }}
                          onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-mid)'}
                          onMouseLeave={e => e.currentTarget.style.background = 'var(--accent-light)'}>
                          📄 View
                        </button>
                      </div>
                    </div>
                  );
                })}

                {/* Row totals */}
                <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '8px 20px', borderTop: '1px solid var(--border)', background: '#FAFBFC' }}>
                  <span style={{ fontSize: 12, color: 'var(--text-muted)', marginRight: 8 }}>Total:</span>
                  <span style={{ fontSize: 13, fontFamily: 'DM Mono', fontWeight: 600 }}>{totalHrs.toFixed(1)}h</span>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

const DAY_SHORT_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ── Summary Screen ──────────────────────────────────────────────────── */

const SummaryScreen = ({ onNav }) => {
  const { week, by_employee, by_task_code } = MOCK_SUMMARY;
  const grandHours = by_task_code.reduce((s, r) => s + r.total_hours, 0);
  const grandCostNo = by_task_code.reduce((s, r) => s + r.cost_no, 0);
  const grandCostBurden = by_task_code.reduce((s, r) => s + r.cost_burden, 0);

  // Group by employee preserving order
  const grouped = {};
  by_employee.forEach(r => {
    if (!grouped[r.name]) grouped[r.name] = { trade: r.trade, rows: [] };
    grouped[r.name].rows.push(r);
  });

  // Build flat row list with subtotal rows interleaved
  const empRows = [];
  Object.entries(grouped).forEach(([name, { trade, rows }]) => {
    const subHours  = rows.reduce((s, r) => s + r.hours, 0);
    const subNo     = rows.reduce((s, r) => s + r.cost_no, 0);
    const subBurden = rows.reduce((s, r) => s + r.cost_burden, 0);
    rows.forEach((r, ri) => empRows.push({ type: 'data', name, trade, row: r, ri, total: rows.length }));
    empRows.push({ type: 'subtotal', name, subHours, subNo, subBurden });
  });

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Top bar */}
      <div style={{ padding: '14px 32px', background: '#fff', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
        <Btn variant="ghost" size="sm" onClick={() => onNav('review')}>← Back to Review</Btn>
        <div style={{ width: 1, height: 20, background: 'var(--border)' }} />
        <div style={{ fontSize: 14, fontWeight: 700 }}>Summary: {week.label}</div>
        <Badge status={week.status} />
        <div style={{ flex: 1 }} />
        <Btn variant="ghost" size="sm">📄 Export CSV</Btn>
        <Btn size="sm">📊 Export Excel</Btn>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px', display: 'flex', flexDirection: 'column', gap: 20 }}>
        {/* Stat row */}
        <div style={{ display: 'flex', gap: 14 }}>
          <StatCard label="Total Hours"     value={grandHours.toFixed(1)}                        sub={`${Object.keys(grouped).length} employees`} accent />
          <StatCard label="Labour Cost"     value={`$${(grandCostNo/1000).toFixed(1)}k`}         sub="No burden" />
          <StatCard label="Total w/ Burden" value={`$${(grandCostBurden/1000).toFixed(1)}k`}     sub="×1.3 factor" />
          <StatCard label="Task Codes"      value={by_task_code.length}                          sub="Active this week" />
        </div>

        {/* Employee Breakdown — single table with subtotal rows */}
        <Card padding="0">
          <div style={{ padding: '16px 20px 14px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Employee Breakdown</div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: '2px solid var(--border)', background: '#FAFBFC' }}>
                  {['Employee', 'Trade Level', 'Task Code', 'Hours', 'Cost (No Burden)', 'Cost (With Burden)'].map((h, i) => (
                    <th key={i} style={{
                      padding: '10px 14px',
                      textAlign: i >= 3 ? 'right' : 'left',
                      fontSize: 11, fontWeight: 600, color: 'var(--text-muted)',
                      letterSpacing: '0.06em', textTransform: 'uppercase', whiteSpace: 'nowrap',
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {empRows.map((item, idx) => {
                  if (item.type === 'subtotal') {
                    return (
                      <tr key={`sub-${idx}`} style={{ background: '#ECEFF1', borderBottom: '2px solid var(--border)' }}>
                        <td colSpan={3} style={{ padding: '9px 14px', fontSize: 12, fontWeight: 700, color: 'var(--text-secondary)' }}>
                          {item.name} — Subtotal
                        </td>
                        <td style={{ padding: '9px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, fontWeight: 700 }}>{item.subHours.toFixed(1)}</td>
                        <td style={{ padding: '9px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, fontWeight: 700, color: 'var(--text-secondary)' }}>${item.subNo.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                        <td style={{ padding: '9px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, fontWeight: 700 }}>${item.subBurden.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                      </tr>
                    );
                  }
                  const { name, trade, row: r, ri } = item;
                  return (
                    <tr key={`data-${idx}`}
                      style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s' }}
                      onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <td style={{ padding: '11px 14px' }}>
                        {ri === 0 ? (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <div style={{ width: 26, height: 26, borderRadius: '50%', background: 'var(--accent-light)', color: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, flexShrink: 0 }}>
                              {name.split(', ').map(n => n[0]).join('')}
                            </div>
                            <span style={{ fontWeight: 500 }}>{name}</span>
                          </div>
                        ) : null}
                      </td>
                      <td style={{ padding: '11px 14px', fontSize: 12, color: 'var(--text-secondary)' }}>{ri === 0 ? trade : ''}</td>
                      <td style={{ padding: '11px 14px' }}>{r.task_code}</td>
                      <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12 }}>{r.hours.toFixed(1)}</td>
                      <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, color: 'var(--text-secondary)' }}>${r.cost_no.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                      <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, fontWeight: 500 }}>${r.cost_burden.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>

        {/* Task Code Totals */}
        <Card padding="0">
          <div style={{ padding: '16px 20px 14px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Task Code Totals</div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: '2px solid var(--border)', background: '#FAFBFC' }}>
                  {['Task Code', 'Total Hours', 'Total Cost (No Burden)', 'Total Cost (With Burden)'].map((h, i) => (
                    <th key={i} style={{ padding: '10px 14px', textAlign: i === 0 ? 'left' : 'right', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {by_task_code.map((r, i) => (
                  <tr key={i} style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <td style={{ padding: '12px 14px', fontWeight: 500 }}>{r.task_code}</td>
                    <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'DM Mono' }}>{r.total_hours.toFixed(1)}</td>
                    <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'DM Mono', color: 'var(--text-secondary)' }}>${r.cost_no.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                    <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontWeight: 500 }}>${r.cost_burden.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                  </tr>
                ))}
                {/* Grand total row */}
                <tr style={{ background: '#0F1117' }}>
                  <td style={{ padding: '11px 14px', color: '#fff', fontWeight: 700, fontSize: 12, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Grand Total</td>
                  <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', color: '#fff', fontWeight: 700 }}>{grandHours.toFixed(1)}</td>
                  <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', color: '#9CA3AF', fontWeight: 700 }}>${grandCostNo.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                  <td style={{ padding: '11px 14px', textAlign: 'right', fontFamily: 'DM Mono', color: '#fff', fontWeight: 700 }}>${grandCostBurden.toLocaleString('en-CA', { minimumFractionDigits: 2 })}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </Card>
      </div>
    </div>
  );
};

/* ── Employees ───────────────────────────────────────────────────────── */

/* ── Bulk Add Dialog ─────────────────────────────────────────────────── */

const BulkAddDialog = ({ onClose }) => {
  const [importing, setImporting] = useState(false);
  const [imported, setImported] = useState(null);
  const fileRef = useRef(null);

  const handleDownloadTemplate = () => {
    // Simulate download — in production this would fetch/generate the xlsx
    const csv = [
      'Full Name,Trade Level,Wage,Burden Rate,Additional Pay',
      'John Smith,Journeyman,42.00,54.60,0.00',
      'Jane Doe,Foreman,48.00,62.40,2.00',
    ].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'employee_template.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImporting(true);
    // Simulate parsing delay
    setTimeout(() => {
      setImporting(false);
      setImported(file.name);
    }, 900);
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(15,17,23,0.45)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000,
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', borderRadius: 12, width: 380,
        boxShadow: '0 8px 32px rgba(0,0,0,0.18)', overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ padding: '20px 24px 16px', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)' }}>Bulk Add Employees</div>
          <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 3 }}>
            Download the Excel template, fill it in, then import.
          </div>
        </div>

        {/* Body */}
        <div style={{ padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>

          {/* Step 1 — Download template */}
          <div style={{ border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>Download Excel Template</div>
              <div style={{ fontSize: 11, color: 'var(--text-secondary)' }}>Pre-filled with trade levels and wage columns</div>
            </div>
            <Btn variant="subtle" size="sm" onClick={handleDownloadTemplate}>Download</Btn>
          </div>

          {/* Step 2 — Import */}
          <div style={{ border: `1px solid ${imported ? 'oklch(0.85 0.06 145)' : 'var(--border)'}`, borderRadius: 10, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14, background: imported ? 'var(--success-light)' : '#fff', transition: 'all 0.2s' }}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: imported ? 'oklch(0.92 0.06 145)' : '#F3F4F6', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={imported ? 'var(--success)' : 'var(--text-muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                {imported
                  ? <polyline points="9 15 12 18 15 15"/>
                  : <><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></>
                }
              </svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>
                {imported ? `Imported: ${imported}` : 'Import Template'}
              </div>
              <div style={{ fontSize: 11, color: imported ? 'var(--success)' : 'var(--text-secondary)' }}>
                {imported ? 'File ready — click Import below' : 'Select a filled .csv or .xlsx file'}
              </div>
            </div>
            {importing ? (
              <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>Reading…</span>
            ) : (
              <>
                <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: 'none' }} onChange={handleImport} />
                <Btn variant={imported ? 'ghost' : 'subtle'} size="sm" onClick={() => fileRef.current && fileRef.current.click()}>
                  {imported ? 'Change' : 'Browse…'}
                </Btn>
              </>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding: '12px 24px 20px', display: 'flex', justifyContent: 'flex-end', gap: 8, borderTop: '1px solid var(--border)' }}>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn disabled={!imported} onClick={onClose}>Import {imported ? 'Employees' : '…'}</Btn>
        </div>
      </div>
    </div>
  );
};

/* ── Employees Screen ────────────────────────────────────────────────── */

const EmployeesScreen = () => {
  const [editMode, setEditMode] = useState(false);
  const [employees, setEmployees] = useState(MOCK_EMPLOYEES);
  const [sortCol, setSortCol] = useState(null);
  const [sortAsc, setSortAsc] = useState(true);
  const [showDialog, setShowDialog] = useState(false);
  const [showBulkDialog, setShowBulkDialog] = useState(false);

  const sorted = [...employees].sort((a, b) => {
    if (!sortCol) return 0;
    const va = a[sortCol], vb = b[sortCol];
    return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  const SortIcon = ({ col }) => {
    if (sortCol !== col) return <span style={{ color: '#D1D5DB', marginLeft: 4, fontSize: 10 }}>⇅</span>;
    return <span style={{ color: 'var(--accent)', marginLeft: 4, fontSize: 10 }}>{sortAsc ? '↑' : '↓'}</span>;
  };

  const thStyle = (col) => ({
    padding: '10px 14px', textAlign: col === 'wage' || col === 'additional_pay' || col === 'burden_rate' ? 'right' : 'left',
    fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.06em',
    textTransform: 'uppercase', cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap',
  });

  const handleSort = (col) => {
    if (sortCol === col) setSortAsc(!sortAsc);
    else { setSortCol(col); setSortAsc(true); }
  };

  const TRADE_LEVELS = ['1st Year','2nd Year','3rd Year','4th Year','Journeyman','Lead Hand','Sub-Foreman','Foreman','Senior Foreman','Superintendent'];

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      {showBulkDialog && <BulkAddDialog onClose={() => setShowBulkDialog(false)} />}
      <PageHeader
        title="Employees"
        subtitle={`${employees.length} active employees`}
        actions={<>
          <Btn variant={editMode ? 'success' : 'ghost'} onClick={() => setEditMode(!editMode)}>
            {editMode ? '✓ Done' : '✏ Edit'}
          </Btn>
          <Btn variant="primary" onClick={() => setShowBulkDialog(true)}>📋 Bulk Add Employees</Btn>
          <Btn onClick={() => setShowDialog(true)}>+ New Employee</Btn>
        </>}
      />

      <Card padding="0">
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: '2px solid var(--border)', background: '#FAFBFC' }}>
                {editMode && <th style={{ ...thStyle(''), width: 80 }}></th>}
                <th style={thStyle('last_name')} onClick={() => handleSort('last_name')}>Name <SortIcon col="last_name" /></th>
                <th style={thStyle('trade_level')} onClick={() => handleSort('trade_level')}>Trade Level <SortIcon col="trade_level" /></th>
                <th style={{ ...thStyle('wage'), textAlign: 'right' }} onClick={() => handleSort('wage')}>Base Wage <SortIcon col="wage" /></th>
                <th style={{ ...thStyle('additional_pay'), textAlign: 'right' }} onClick={() => handleSort('additional_pay')}>Add. Pay <SortIcon col="additional_pay" /></th>
                <th style={{ ...thStyle('wage'), textAlign: 'right' }}>Effective</th>
                <th style={{ ...thStyle('burden_rate'), textAlign: 'right' }} onClick={() => handleSort('burden_rate')}>Burden Rate <SortIcon col="burden_rate" /></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map((emp, i) => (
                <tr key={emp.id} style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s' }}
                  onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  {editMode && (
                    <td style={{ padding: '8px 14px' }}>
                      <Btn variant="danger" size="sm" onClick={() => setEmployees(prev => prev.filter(e => e.id !== emp.id))}>Delete</Btn>
                    </td>
                  )}
                  <td style={{ padding: '13px 14px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--accent-light)', color: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, flexShrink: 0 }}>
                        {emp.first_name[0]}{emp.last_name[0]}
                      </div>
                      {editMode ? (
                        <input defaultValue={`${emp.first_name} ${emp.last_name}`} style={{ height: 30, padding: '0 8px', fontSize: 13, fontFamily: 'DM Sans', border: '1px solid var(--border)', borderRadius: 6, outline: 'none', width: 160 }} />
                      ) : (
                        <span style={{ fontWeight: 500 }}>{emp.first_name} {emp.last_name}</span>
                      )}
                    </div>
                  </td>
                  <td style={{ padding: '13px 14px' }}>
                    {editMode ? (
                      <select defaultValue={emp.trade_level} style={{ height: 30, padding: '0 8px', fontSize: 12, fontFamily: 'DM Sans', border: '1px solid var(--border)', borderRadius: 6, outline: 'none', background: '#fff' }}>
                        {TRADE_LEVELS.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    ) : (
                      <span style={{
                        display: 'inline-block', padding: '2px 8px', borderRadius: 4,
                        fontSize: 11, fontWeight: 500, background: 'var(--accent-light)', color: 'var(--accent)',
                      }}>{emp.trade_level}</span>
                    )}
                  </td>
                  <td style={{ padding: '13px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12 }}>${emp.wage.toFixed(2)}</td>
                  <td style={{ padding: '13px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, color: emp.additional_pay > 0 ? 'var(--success)' : 'var(--text-muted)' }}>
                    {emp.additional_pay > 0 ? `+$${emp.additional_pay.toFixed(2)}` : '—'}
                  </td>
                  <td style={{ padding: '13px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, fontWeight: 500 }}>${(emp.wage + emp.additional_pay).toFixed(2)}</td>
                  <td style={{ padding: '13px 14px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, color: 'var(--text-secondary)' }}>${emp.burden_rate.toFixed(2)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
};

/* ── Wages ───────────────────────────────────────────────────────────── */

const WagesScreen = () => {
  const [editMode, setEditMode] = useState(false);
  const [wages, setWages] = useState(MOCK_WAGES);
  const [saved, setSaved] = useState(false);

  const updateWage = (idx, val) => {
    setWages(prev => prev.map((w, i) => i === idx ? { ...w, hourly_wage: parseFloat(val) || 0 } : w));
  };

  const save = () => {
    setEditMode(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      <PageHeader
        title="Wage Table"
        subtitle="Default hourly wages by trade level. Burden = wage × 1.3"
        actions={<>
          {saved && <span style={{ fontSize: 12, color: 'var(--success)', fontWeight: 500 }}>✓ Saved</span>}
          <Btn variant={editMode ? 'success' : 'ghost'} onClick={editMode ? save : () => setEditMode(true)}>
            {editMode ? '✓ Save Changes' : '✏ Edit Wages'}
          </Btn>
        </>}
      />

      <Card padding="0" style={{ maxWidth: 520 }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: '2px solid var(--border)', background: '#FAFBFC' }}>
                {['Trade Level', 'Hourly Wage', 'Burden Rate'].map((h, i) => (
                  <th key={i} style={{ padding: '10px 18px', textAlign: i === 0 ? 'left' : 'right', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {wages.map((w, i) => (
                <tr key={i} style={{ borderBottom: '1px solid var(--border-light)', transition: 'background 0.1s' }}
                  onMouseEnter={e => e.currentTarget.style.background = '#FAFBFC'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <td style={{ padding: '12px 18px', fontWeight: 500 }}>{w.trade_level}</td>
                  <td style={{ padding: '8px 18px', textAlign: 'right' }}>
                    {editMode ? (
                      <input type="number" defaultValue={w.hourly_wage} step="0.50" min="0"
                        onChange={e => updateWage(i, e.target.value)}
                        style={{ width: 90, height: 30, padding: '0 8px', fontSize: 13, fontFamily: 'DM Mono', border: '1px solid var(--accent)', borderRadius: 6, outline: 'none', textAlign: 'right', background: 'var(--accent-light)' }}
                      />
                    ) : (
                      <span style={{ fontFamily: 'DM Mono', fontSize: 13 }}>${w.hourly_wage.toFixed(2)}</span>
                    )}
                  </td>
                  <td style={{ padding: '12px 18px', textAlign: 'right', fontFamily: 'DM Mono', fontSize: 12, color: 'var(--text-secondary)' }}>
                    ${(w.hourly_wage * 1.3).toFixed(2)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
};

/* ── Task Codes ──────────────────────────────────────────────────────── */

const TaskCodesScreen = () => {
  const [codes, setCodes] = useState(MOCK_TASK_CODES);
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');
  const [newCat, setNewCat] = useState('floor');
  const [newFloorLevels, setNewFloorLevels] = useState('');
  const [newIsRoof, setNewIsRoof] = useState(false);

  const floor = codes.filter(c => c.category === 'floor');
  const project = codes.filter(c => c.category === 'project');

  // Validate floor level input: accepts "1-6", "1,3,5", or single digit "1"
  const floorLevelValid = (val) => {
    if (!val.trim()) return true; // empty is ok if roof is checked
    return /^([1-9]|[1-9]\s*-\s*[1-9]|[1-9](\s*,\s*[1-9])*)$/.test(val.trim());
  };

  const addCode = () => {
    if (!newName.trim()) return;
    if (newCat === 'floor' && !newFloorLevels.trim() && !newIsRoof) return;
    if (newCat === 'floor' && newFloorLevels.trim() && !floorLevelValid(newFloorLevels)) return;
    setCodes(prev => [...prev, {
      id: Date.now(),
      code_name: newName.trim(),
      category: newCat,
      floor_level: newCat === 'floor' ? newFloorLevels.trim() : '',
      include_roof: newCat === 'floor' ? newIsRoof : false,
    }]);
    setNewName(''); setNewFloorLevels(''); setNewIsRoof(false); setShowAdd(false);
  };

  const CodeList = ({ items, title, icon }) => (
    <Card padding="0" style={{ flex: 1 }}>
      <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 16 }}>{icon}</span>
          <span style={{ fontSize: 13, fontWeight: 600 }}>{title}</span>
        </div>
        <span style={{ fontSize: 11, fontFamily: 'DM Mono', color: 'var(--text-muted)', background: '#F3F4F6', padding: '2px 7px', borderRadius: 10 }}>{items.length}</span>
      </div>
      <div style={{ maxHeight: 380, overflowY: 'auto' }}>
        {items.map((code, i) => (
          <div key={code.id}
            onClick={() => setSelected(selected === code.id ? null : code.id)}
            style={{
              padding: '10px 18px', borderBottom: i < items.length - 1 ? '1px solid var(--border-light)' : 'none',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              background: selected === code.id ? 'var(--accent-light)' : 'transparent',
              transition: 'background 0.1s',
            }}
            onMouseEnter={e => { if (selected !== code.id) e.currentTarget.style.background = '#FAFBFC'; }}
            onMouseLeave={e => { if (selected !== code.id) e.currentTarget.style.background = 'transparent'; }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              <span style={{ fontSize: 13, color: selected === code.id ? 'var(--accent)' : 'var(--text-primary)', fontWeight: selected === code.id ? 500 : 400 }}>{code.code_name}</span>
              {code.floor_level && <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Floor(s): {code.floor_level}{code.include_roof ? ' · Roof' : ''}</span>}
              {code.include_roof && !code.floor_level && <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Roof</span>}
            </div>
            {selected === code.id && (
              <button onClick={(e) => { e.stopPropagation(); setCodes(prev => prev.filter(c => c.id !== code.id)); setSelected(null); }}
                style={{ background: 'var(--danger-light)', color: 'var(--danger)', border: 'none', borderRadius: 4, padding: '2px 8px', fontSize: 11, cursor: 'pointer', fontFamily: 'DM Sans', fontWeight: 500 }}>
                Remove
              </button>
            )}
          </div>
        ))}
      </div>
    </Card>
  );

  const floorInvalid = newCat === 'floor' && newFloorLevels.trim() && !floorLevelValid(newFloorLevels);

  return (
    <div style={{ padding: '28px 32px', height: '100%', overflowY: 'auto' }}>
      <PageHeader
        title="Task Codes"
        subtitle="Manage floor-based and project-wide task codes"
        actions={<Btn onClick={() => setShowAdd(!showAdd)}>+ Add Task Code</Btn>}
      />

      {showAdd && (
        <Card style={{ marginBottom: 20, maxWidth: 560 }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 14 }}>New Task Code</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {/* Row 1: Code Name + Category */}
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 11, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Code Name</label>
                <Input value={newName} onChange={setNewName} placeholder="e.g. 7th Floor Boxing" />
              </div>
              <div>
                <label style={{ fontSize: 11, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Category</label>
                <Select value={newCat} onChange={v => { setNewCat(v); setNewFloorLevels(''); setNewIsRoof(false); }} options={[{ value: 'floor', label: 'Floor-Based' }, { value: 'project', label: 'Project-Wide' }]} />
              </div>
            </div>
            {/* Row 2: Floor Level(s) + Roof checkbox — only for Floor-Based */}
            {newCat === 'floor' && (
              <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 11, color: floorInvalid ? 'var(--danger)' : 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                    Floor Level(s)
                  </label>
                  <input
                    value={newFloorLevels}
                    onChange={e => setNewFloorLevels(e.target.value)}
                    placeholder="e.g. 1-6 or 1, 3, 5 or 1"
                    style={{
                      height: 36, padding: '0 12px', fontSize: 13, fontFamily: 'DM Sans',
                      border: `1px solid ${floorInvalid ? 'var(--danger)' : 'var(--border)'}`,
                      borderRadius: 8, outline: 'none', background: '#fff',
                      color: 'var(--text-primary)', width: '100%', transition: 'border-color 0.15s',
                    }}
                  />
                  {floorInvalid && (
                    <div style={{ fontSize: 11, color: 'var(--danger)', marginTop: 4 }}>
                      Use formats: 1-6, 1,3,5, or a single number
                    </div>
                  )}
                </div>
                <div style={{ flexShrink: 0, paddingBottom: floorInvalid ? 22 : 2 }}>
                  <label style={{ fontSize: 11, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Roof</label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', height: 36, padding: '0 4px' }}>
                    <input
                      type="checkbox"
                      checked={newIsRoof}
                      onChange={e => setNewIsRoof(e.target.checked)}
                      style={{ width: 16, height: 16, accentColor: 'var(--accent)', cursor: 'pointer' }}
                    />
                    <span style={{ fontSize: 13, color: 'var(--text-primary)', fontFamily: 'DM Sans' }}>Include Roof</span>
                  </label>
                </div>
              </div>
            )}
            {/* Row 3: Actions */}
            <div style={{ display: 'flex', gap: 8, paddingTop: 2 }}>
              <Btn onClick={addCode}>Add</Btn>
              <Btn variant="ghost" onClick={() => { setShowAdd(false); setNewName(''); setNewFloorLevels(''); setNewIsRoof(false); }}>Cancel</Btn>
            </div>
          </div>
        </Card>
      )}

      <div style={{ display: 'flex', gap: 16 }}>
        <CodeList items={floor} title="Floor-Based" icon="🏗" />
        <CodeList items={project} title="Project-Wide" icon="📋" />
      </div>
    </div>
  );
};

/* ── App Shell ───────────────────────────────────────────────────────── */

const { useTweaks, TweaksPanel, TweakSection, TweakText, TweakToggle, TweakColor, TweakRadio } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "companyName": "Site Connect",
  "accentColor": "#1e51eb",
  "darkSidebar": false,
  "compactDensity": false,
  "monoNumbers": true,
  "statusBar": true,
  "sectionLabels": true,
  "sidebarDensity": "comfortable"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('dashboard');

  const screenMap = {
    dashboard: <Dashboard onNav={setScreen} tweaks={tweaks} />,
    import: <ImportWeek onNav={setScreen} />,
    history: <History onNav={setScreen} />,
    review: <ReviewScreen onNav={setScreen} />,
    summary: <SummaryScreen onNav={setScreen} />,
    employees: <EmployeesScreen />,
    wages: <WagesScreen />,
    task_codes: <TaskCodesScreen />,
    imported: <ImportedReportsScreen />,
  };

  // Apply tweaks to CSS vars
  useEffect(() => {
    const acc = tweaks.accentColor || '#1D6FEB';
    document.documentElement.style.setProperty('--accent', acc);
    document.documentElement.style.setProperty('--accent-hover', acc + 'CC');
    document.documentElement.style.setProperty('--accent-light', acc + '18');
    document.documentElement.style.setProperty('--accent-mid', acc + '44');
    document.documentElement.style.setProperty('--sidebar-bg', tweaks.darkSidebar ? '#0F1117' : '#1E293B');
    const widths = { compact: '180px', comfortable: '220px', spacious: '260px' };
    document.documentElement.style.setProperty('--sidebar-width', widths[tweaks.sidebarDensity] || '220px');
  }, [tweaks]);

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--canvas-bg)' }}>
      <Sidebar active={screen} onNav={setScreen} tweaks={tweaks} />
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', background: 'var(--canvas-bg)' }}>
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {screenMap[screen]}
        </div>
        {tweaks.statusBar !== false && (
          <div style={{
            padding: '6px 24px', background: '#fff', borderTop: '1px solid var(--border)',
            fontSize: 11, color: 'var(--text-muted)', fontFamily: 'DM Mono',
            display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0,
          }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--success)' }}></span>
              Connected
            </span>
            <span style={{ width: 1, height: 12, background: 'var(--border)' }}></span>
            <span>Screen: {SCREEN_LABELS[screen] || screen}</span>
            <span style={{ flex: 1 }}></span>
            <span>v1.0 · weekly_reports.db</span>
          </div>
        )}
      </div>

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakText label="Company Name" value={tweaks.companyName} onChange={v => setTweak('companyName', v)} />
        <TweakColor label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Dark Sidebar" value={tweaks.darkSidebar} onChange={v => setTweak('darkSidebar', v)} />
        <TweakToggle label="Compact Density" value={tweaks.compactDensity} onChange={v => setTweak('compactDensity', v)} />
        <TweakToggle label="Monospace Numbers" value={tweaks.monoNumbers} onChange={v => setTweak('monoNumbers', v)} />
        <TweakToggle label="Status Bar" value={tweaks.statusBar} onChange={v => setTweak('statusBar', v)} />
        <TweakToggle label="Sidebar Section Labels" value={tweaks.sectionLabels} onChange={v => setTweak('sectionLabels', v)} />
        <TweakRadio label="Sidebar Density" value={tweaks.sidebarDensity} onChange={v => setTweak('sidebarDensity', v)} options={[
          { value: 'compact', label: 'Compact' },
          { value: 'comfortable', label: 'Standard' },
          { value: 'spacious', label: 'Spacious' },
        ]} />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
